<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Estudiantes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>

<body>

<div class="container-lg mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h1>Listado de Estudiantes</h1>
        <a th:href="@{/estudiantes/nuevo}" class="btn btn-primary">Nuevo estudiante</a>
    </div>

    <div class="alert alert-primary" role="alert">
        Total de estudiantes:
        <span th:text="${totalEstudiantes}"></span>
    </div>

    <table class="table">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Carrera</th>
                <th>Teléfono</th>
                <th>Materias de interés</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="estudiante : ${estudiantes}">
                <td th:text="${estudiante.usuario.nombre}"></td>
                <td th:text="${estudiante.usuario.correo}"></td>
                <td th:text="${estudiante.carrera}"></td>
                <td th:text="${estudiante.telefono}"></td>
                <td>
                    <span class="badge bg-secondary me-1"
                          th:each="asignatura : ${estudiante.asignaturasInteres}"
                          th:text="${asignatura.nombre}"></span>
                </td>
                <td th:text="${estudiante.activo ? 'Sí' : 'No'}"></td>
                <td>
                    <a th:href="@{/estudiantes/editar/{id}(id=${estudiante.idUsuario})}" class="btn btn-sm btn-outline-primary">Editar</a>
                    <a th:href="@{/estudiantes/eliminar/{id}(id=${estudiante.idUsuario})}" class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('¿Eliminar este estudiante?');">Eliminar</a>
                </td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
