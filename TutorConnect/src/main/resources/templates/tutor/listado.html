<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Tutores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
</head>

<body>

<div class="container-lg mt-4">

    <div class="d-flex justify-content-between align-items-center">
        <h1>Listado de Tutores</h1>
        <a th:href="@{/tutores/nuevo}" class="btn btn-primary">Nuevo tutor</a>
    </div>

    <div class="alert alert-primary" role="alert">
        Total de tutores:
        <span th:text="${totalTutores}"></span>
    </div>

    <table class="table">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Biografía</th>
                <th>Materias</th>
                <th>Activo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="tutor : ${tutores}">
                <td th:text="${tutor.usuario.nombre}"></td>
                <td th:text="${tutor.usuario.correo}"></td>
                <td th:text="${tutor.biografia}"></td>
                <td>
                    <span class="badge bg-secondary me-1"
                          th:each="asignatura : ${tutor.asignaturas}"
                          th:text="${asignatura.nombre}"></span>
                </td>
                <td th:text="${tutor.activo ? 'Sí' : 'No'}"></td>
                <td>
                    <a th:href="@{/tutores/editar/{id}(id=${tutor.idUsuario})}" class="btn btn-sm btn-outline-primary">Editar</a>
                    <a th:href="@{/tutores/eliminar/{id}(id=${tutor.idUsuario})}" class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('¿Eliminar este tutor?');">Eliminar</a>
                </td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
