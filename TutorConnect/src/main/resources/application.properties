spring.application.name=Tutorconnect

# Puerto por donde escucha el servidor web
server.port=80

# Formato de fecha y hora del log
logging.pattern.dateformat=hh:mm

# No mostrar el banner de Spring Boot
spring.main.banner-mode=off

# Evitar caché de Thymeleaf durante el desarrollo
spring.thymeleaf.cache=false

# Conexión local a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tutorconnect
spring.datasource.username=root
spring.datasource.password=1234

# Driver y plataforma
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Crear o actualizar automáticamente las tablas
spring.jpa.hibernate.ddl-auto=update

# Mostrar consultas SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true